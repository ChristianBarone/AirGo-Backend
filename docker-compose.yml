version: "3.3"

services:
  db:
    image: postgres:16
    container_name: airgo_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - airgo_net

  backend:
    build:
      context: ./backend
    container_name: airgo_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    expose:
      - "8080"
    volumes:
      - ./backend/core/migrations:/app/core/migrations
      - static_volume:/app/staticfiles
    networks:
      - airgo_net

  nginx:
    image: nginx:1.27-alpine
    container_name: airgo_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
    networks:
      - airgo_net

  graphhopper:
    image: israelhikingmap/graphhopper:latest
    container_name: airgo_graphhopper
    restart: unless-stopped
    environment:
      - JAVA_OPTS=-Xmx2g -Xms512m
    volumes:
    - ./graphhopper/osm:/data
    ports:
      - "8989:8989"
    networks:
      - airgo_net
    command: --input /data/cataluna-260317.osm.pbf --config /data/config.yml

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - airgo_net

volumes:
  postgres_data:
  static_volume:


networks:
  airgo_net:
    driver: bridge